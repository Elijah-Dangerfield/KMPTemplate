# ─────────────────────────────────────────────────────────────────────────────
# Publishes the marketing site under pages/ to GitHub Pages.
#
# Fires on:     Pushes to main that touch pages/** or this workflow.
#               Also workflow_dispatch for manual re-publish.
# Side effects: Updates the live site at the repo's GitHub Pages URL
#               (the app's privacy/terms links point here).
# Edit to change: contents of pages/ (index.html, privacy.html, terms.html,
#                 style.css). The repo's Pages source must be set to the
#                 "GitHub Actions" source for this workflow to deploy.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - id: deployment
        uses: actions/deploy-pages@v4
